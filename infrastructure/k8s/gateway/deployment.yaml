apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: agent-cluster
  labels:
    app: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: agent-cluster/gateway:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: agent-cluster-config
        - secretRef:
            name: agent-cluster-secrets
        env:
        - name: SERVICE_NAME
          value: "gateway"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: agent-cluster
spec:
  selector:
    app: gateway
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
