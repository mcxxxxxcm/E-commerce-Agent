apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: agent-cluster
  labels:
    app: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
      - name: customer-service
        image: agent-cluster/customer-service:latest
        ports:
        - containerPort: 8004
          name: http
        envFrom:
        - configMapRef:
            name: agent-cluster-config
        - secretRef:
            name: agent-cluster-secrets
        env:
        - name: SERVICE_NAME
          value: "customer-service"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: agent-cluster
spec:
  selector:
    app: customer-service
  ports:
  - port: 8004
    targetPort: 8004
    name: http
  type: ClusterIP
