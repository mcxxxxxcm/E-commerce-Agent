global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: "supervisor"
    static_configs:
      - targets: ["supervisor:8001"]

  - job_name: "agents"
    static_configs:
      - targets:
          - "telemarketing:8002"
          - "live:8003"
          - "customer-service:8004"
          - "operations:8005"
          - "content:8006"
          - "office:8007"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
